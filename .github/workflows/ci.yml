name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable

  test:
      runs-on: ubuntu-latest
      steps:
      - name: Run unit tests
        run: |
          pip install pytest pytest-asyncio
          python -m pytest .